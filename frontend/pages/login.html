<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DriveLuxe</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body { display: flex; min-height: 100vh; overflow: hidden; }
    .auth-visual {
      flex: 1; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1020 100%);
      display: flex; align-items: center; justify-content: center;
    }
    @media (max-width: 768px) { .auth-visual { display: none; } }
    .auth-visual img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.25; }
    .auth-visual-content { position: relative; text-align: center; padding: 2rem; }
    .auth-panel {
      width: 440px; min-width: 320px; background: var(--bg-secondary);
      display: flex; flex-direction: column; justify-content: center;
      padding: 3rem 2.5rem; overflow-y: auto;
      border-left: 1px solid var(--border);
    }
    @media (max-width: 768px) { .auth-panel { width: 100%; border: none; padding: 2rem 1.5rem; } }
    .auth-logo { font-family: var(--font-display); font-size: 2rem; letter-spacing: 0.08em; margin-bottom: 2.5rem; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 0.5rem; }
    .auth-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
    .auth-divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-divider span { font-size: 0.75rem; color: var(--text-muted); }
    .auth-switch { text-align: center; font-size: 0.875rem; color: var(--text-secondary); margin-top: 1.5rem; }
    .auth-switch a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>

  <div class="auth-visual">
    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200&q=80" alt="Luxury car">
    <div class="auth-visual-content">
      <div style="font-family:var(--font-display);font-size:4rem;letter-spacing:0.08em;margin-bottom:1rem;">
        DRIVE<span style="color:var(--accent);">LUXE</span>
      </div>
      <p style="color:var(--text-secondary);max-width:320px;line-height:1.7;">
        Premium car rentals for those who demand the best in every journey.
      </p>
      <div style="display:flex;gap:2rem;justify-content:center;margin-top:3rem;">
        <div style="text-align:center;">
          <div style="font-family:var(--font-display);font-size:2rem;color:var(--accent);">100+</div>
          <div style="font-size:0.75rem;color:var(--text-muted);letter-spacing:0.1em;">VEHICLES</div>
        </div>
        <div style="text-align:center;">
          <div style="font-family:var(--font-display);font-size:2rem;color:var(--accent);">4.9★</div>
          <div style="font-size:0.75rem;color:var(--text-muted);letter-spacing:0.1em;">RATING</div>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-panel">
    <div class="auth-logo"><a href="../index.html" style="text-decoration:none;">DRIVE<span>LUXE</span></a></div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <!-- Demo credentials hint -->
    <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:var(--radius-sm);padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:0.82rem;color:var(--text-secondary);">
      <strong style="color:var(--accent);">Demo:</strong>
      Admin: admin@carrental.com / admin123 &nbsp;|&nbsp;
      User: john@example.com / user123
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        <div class="form-error" id="emailError"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
          <button type="button" onclick="togglePwd('password','eyeIcon')" style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;" id="eyeIcon">👁</button>
        </div>
        <div class="form-error" id="pwdError"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
        Sign In
      </button>
    </form>

    <div class="auth-divider"><span>OR</span></div>

    <div class="auth-switch">
      Don't have an account? <a href="register.html">Create one free →</a>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = Auth.isAdmin() ? 'admin.html' : 'dashboard.html';
    }

    function togglePwd(inputId, btnId) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Clear previous errors
      document.getElementById('emailError').textContent = '';
      document.getElementById('pwdError').textContent   = '';

      try {
        const data = await API.login({ email, password });
        Auth.save(data.token, data.user);
        Toast.success('Welcome back!', `Hello, ${data.user.name}`);
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }, 800);
      } catch (err) {
        Toast.error('Login failed', err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';

        if (err.message.toLowerCase().includes('email')) {
          document.getElementById('emailError').textContent = err.message;
        } else {
          document.getElementById('pwdError').textContent = err.message;
        }
      }
    });
  </script>
</body>
</html>
